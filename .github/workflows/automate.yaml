# ...Test(2)...#
name: Build + Push

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      BACKEND_REPO: ${{ secrets.GAR_BACKEND_REPO }}
      FRONTEND_REPO: ${{ secrets.GAR_FRONTEND_REPO }}
      IMAGE_TAG: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

      - name: Build & Push Backend Image to GAR
        run: |
          docker build \
            --tag europe-north2-docker.pkg.dev/${GCP_PROJECT_ID}/${BACKEND_REPO}/backend:${IMAGE_TAG} \
            ./backend

          docker push europe-north2-docker.pkg.dev/${GCP_PROJECT_ID}/${BACKEND_REPO}/backend:${IMAGE_TAG}

      - name: Build & Push Frontend Image to GAR
        run: |
          docker build \
            --tag europe-north2-docker.pkg.dev/${GCP_PROJECT_ID}/${FRONTEND_REPO}/frontend:${IMAGE_TAG} \
            ./frontend

          docker push europe-north2-docker.pkg.dev/${GCP_PROJECT_ID}/${FRONTEND_REPO}/frontend:${IMAGE_TAG}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_SSH_KEY }}
          envs: IMAGE_TAG,GCP_REGION
          script: |
            cd /opt/clickmart

            gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev

            sudo docker compose -f docker-compose.prod.yaml pull
            sudo docker compose -f docker-compose.prod.yaml up -d





